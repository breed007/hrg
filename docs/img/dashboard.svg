    <text x="900" y="458" fill="#7fc9a2">show missing</text>

    <text x="26" y="488" fill="#d7dad2" font-weight="600">Recovery steps</text>
    <rect x="380" y="478" width="420" height="10" rx="5" fill="#242822"/>
    <rect x="380" y="478" width="70" height="10" rx="5" fill="#e3b35c"/>
