<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 720" width="1040" height="720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- window chrome -->
  <rect width="1040" height="720" rx="14" fill="#0f110e"/>
  <rect x="1" y="1" width="1038" height="718" rx="13" fill="none" stroke="#2c302b"/>
  <rect width="1040" height="46" rx="14" fill="#1c201b"/>
  <rect y="30" width="1040" height="16" fill="#1c201b"/>
  <circle cx="26" cy="23" r="6" fill="#e06c60"/><circle cx="48" cy="23" r="6" fill="#e0b64d"/><circle cx="70" cy="23" r="6" fill="#5fbf7f"/>
  <rect x="150" y="12" width="740" height="22" rx="11" fill="#141613"/>
  <text x="170" y="27" font-size="12" fill="#8a8f86">127.0.0.1:8080  ·  Dashboard · HRG</text>

  <!-- app nav -->
  <text x="26" y="82" font-size="20" font-weight="800" fill="#7fc9a2" letter-spacing="2">HRG</text>
  <g font-size="13.5" fill="#cfd2ca">
    <text x="92" y="82">Resources</text><text x="182" y="82">Map</text><text x="228" y="82">IP plan</text>
    <text x="296" y="82">Runbook</text><text x="372" y="82">Runs</text><text x="422" y="82">Collectors</text><text x="512" y="82">Settings</text>
  </g>
  <rect x="900" y="66" width="116" height="26" rx="6" fill="#7fc9a2"/>
  <text x="958" y="83" font-size="12.5" font-weight="600" fill="#0f110e" text-anchor="middle">Collect now</text>
  <line x1="0" y1="104" x2="1040" y2="104" stroke="#242822"/>

  <text x="26" y="146" font-size="26" font-weight="800" fill="#f0f0ea">Dashboard</text>

  <!-- stat cards -->
  <g>
    <rect x="26"  y="168" width="150" height="86" rx="10" fill="#171a15" stroke="#242822"/>
    <text x="44" y="216" font-size="34" font-weight="800" fill="#f0f0ea">37</text>
    <text x="44" y="238" font-size="12" fill="#9a9a92">resources</text>
    <rect x="188" y="168" width="150" height="86" rx="10" fill="#171a15" stroke="#242822"/>
    <text x="206" y="216" font-size="34" font-weight="800" fill="#e3b35c">1</text>
    <text x="206" y="238" font-size="12" fill="#9a9a92">orphaned — review</text>
    <rect x="350" y="168" width="150" height="86" rx="10" fill="#171a15" stroke="#242822"/>
    <text x="368" y="216" font-size="34" font-weight="800" fill="#f0f0ea">6</text>
    <text x="368" y="238" font-size="12" fill="#9a9a92">collectors</text>
  </g>

  <!-- coverage -->
  <text x="26" y="292" font-size="16" font-weight="700" fill="#e8e8e2">Runbook coverage</text>
  <g font-size="13">
    <text x="26" y="326" fill="#d7dad2" font-weight="600">Purpose documented</text>
    <rect x="330" y="316" width="470" height="10" rx="5" fill="#242822"/>
    <rect x="330" y="316" width="150" height="10" rx="5" fill="#7fc9a2"/>
    <text x="820" y="326" fill="#9a9a92">12 / 37</text>
    <text x="900" y="326" fill="#7fc9a2">show missing</text>

    <text x="26" y="356" fill="#d7dad2" font-weight="600">Recovery steps</text>
    <rect x="330" y="346" width="470" height="10" rx="5" fill="#242822"/>
    <rect x="330" y="346" width="80" height="10" rx="5" fill="#e3b35c"/>
    <text x="820" y="356" fill="#9a9a92">3 / 19</text>
    <text x="900" y="356" fill="#7fc9a2">show missing</text>

    <text x="26" y="386" fill="#d7dad2" font-weight="600">Backups restore-tested</text>
    <rect x="330" y="376" width="470" height="10" rx="5" fill="#242822"/>
    <rect x="330" y="376" width="235" height="10" rx="5" fill="#7fc9a2"/>
    <text x="820" y="386" fill="#9a9a92">1 / 2</text>
  </g>
  <text x="26" y="418" font-size="12" fill="#9a9a92">A stressed reader needs the <tspan font-style="italic">why</tspan> and the <tspan font-style="italic">how</tspan>, not just the inventory. HRG nags until you fill the gaps.</text>

  <!-- collector health -->
  <text x="26" y="462" font-size="16" font-weight="700" fill="#e8e8e2">Collector health</text>
  <line x1="26" y1="476" x2="1014" y2="476" stroke="#242822"/>
  <g font-size="13" fill="#cfd2ca">
    <text x="26" y="504">proxmox:pve1</text>  <rect x="200" y="492" width="34" height="18" rx="4" fill="#1d3327"/><text x="217" y="505" fill="#7fc9a2" text-anchor="middle" font-size="11">ok</text>  <text x="280" y="504" fill="#8a8f86">2 min ago</text>
    <line x1="26" y1="518" x2="1014" y2="518" stroke="#1f231d"/>
    <text x="26" y="544">docker:nas</text>     <rect x="200" y="532" width="34" height="18" rx="4" fill="#1d3327"/><text x="217" y="545" fill="#7fc9a2" text-anchor="middle" font-size="11">ok</text>  <text x="280" y="544" fill="#8a8f86">2 min ago</text>
    <line x1="26" y1="558" x2="1014" y2="558" stroke="#1f231d"/>
    <text x="26" y="584">unifi:home</text>     <rect x="200" y="572" width="34" height="18" rx="4" fill="#1d3327"/><text x="217" y="585" fill="#7fc9a2" text-anchor="middle" font-size="11">ok</text>  <text x="280" y="584" fill="#8a8f86">2 min ago</text>
    <line x1="26" y1="598" x2="1014" y2="598" stroke="#1f231d"/>
    <text x="26" y="624">netbox:main</text>    <rect x="200" y="612" width="50" height="18" rx="4" fill="#3c2020"/><text x="225" y="625" fill="#e08a8a" text-anchor="middle" font-size="11">error</text>  <text x="280" y="624" fill="#e08a8a" font-size="12">401 Unauthorized — token expired</text>
  </g>

  <!-- setup banner ghost -->
  <rect x="26" y="656" width="988" height="40" rx="8" fill="#14231b" stroke="#2f6f4f"/>
  <text x="44" y="681" font-size="13" fill="#cfd2ca">👋 New here? Run the <tspan fill="#7fc9a2" font-weight="600">setup wizard</tspan> to get from empty to a first runbook in five steps.</text>
</svg>
