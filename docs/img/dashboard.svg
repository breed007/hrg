  <g font-size="13" fill="#cfd2ca">
    <text x="26" y="694">netbox:main</text>
    <rect x="200" y="682" width="50" height="18" rx="4" fill="#3c2020"/>
    <text x="225" y="695" fill="#e08a8a" text-anchor="middle" font-size="11">error</text>
    <text x="280" y="694" fill="#e08a8a" font-size="12">401 Unauthorized — token expired</text>
  </g>
