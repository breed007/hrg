  <text x="26" y="566" font-size="16" font-weight="700" fill="#e8e8e2">Copies off this machine</text>
  <rect x="26" y="580" width="988" height="40" rx="8" fill="#3a2f14" stroke="#e3b35c"/>
  <text x="44" y="605" font-size="13" fill="#e8e8e2"><tspan font-weight="700">The last copy left on 2026-06-14</tspan> via Partner's inbox — over a month ago.
    <tspan fill="#9a9a92">Whatever has changed here since then exists in one place.</tspan></text>

