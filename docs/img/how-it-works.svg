<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" width="1200" height="460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1200" height="460" rx="18" fill="#141613"/>
  <rect x="1" y="1" width="1198" height="458" rx="17" fill="none" stroke="#2c302b" stroke-width="2"/>

  <text x="40" y="52" font-size="24" font-weight="700" fill="#e8e8e2">How it works</text>

  <defs>
    <marker id="arw" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#7fc9a2"/>
    </marker>
  </defs>

  <!-- 1. Collectors -->
  <rect x="40" y="96" width="250" height="266" rx="12" fill="#1a1e19" stroke="#2f6f4f" stroke-width="1.5"/>
  <text x="60" y="128" font-size="17" font-weight="700" fill="#7fc9a2">1 · Collectors</text>
  <text x="60" y="150" font-size="12.5" fill="#9a9a92">read-only, secrets never stored</text>
  <g font-size="13.5" fill="#d7dad2">
    <text x="60" y="184">• Proxmox</text>
    <text x="60" y="210">• Docker</text>
    <text x="60" y="236">• UniFi</text>
    <text x="60" y="262">• NetBox</text>
    <text x="60" y="288">• AdGuard Home</text>
    <text x="60" y="314">• Manual YAML</text>
  </g>
  <text x="60" y="346" font-size="12" fill="#9a9a92" font-style="italic">observe your infrastructure</text>

  <line x1="296" y1="229" x2="342" y2="229" stroke="#7fc9a2" stroke-width="2.5" marker-end="url(#arw)"/>

  <!-- 2. Store -->
  <rect x="350" y="96" width="250" height="266" rx="12" fill="#1a1e19" stroke="#3d5a80" stroke-width="1.5"/>
  <text x="370" y="128" font-size="17" font-weight="700" fill="#9db8dc">2 · Temporal store</text>
  <text x="370" y="150" font-size="12.5" fill="#9a9a92">SQLite · one static binary</text>
  <g font-size="13.5" fill="#d7dad2">
    <text x="370" y="188">diffs every run</text>
    <text x="370" y="214">versions what changed</text>
    <text x="370" y="240">flags what vanished</text>
    <text x="370" y="266">(orphans keep their notes)</text>
  </g>
  <text x="370" y="322" font-size="12" fill="#9a9a92" font-style="italic">the source of truth,</text>
  <text x="370" y="342" font-size="12" fill="#9a9a92" font-style="italic">kept current automatically</text>

  <line x1="606" y1="229" x2="652" y2="229" stroke="#7fc9a2" stroke-width="2.5" marker-end="url(#arw)"/>

  <!-- 3. Annotations -->
  <rect x="660" y="96" width="250" height="266" rx="12" fill="#1a1e19" stroke="#8a5a12" stroke-width="1.5"/>
  <text x="680" y="128" font-size="17" font-weight="700" fill="#e3b35c">3 · Your knowledge</text>
  <text x="680" y="150" font-size="12.5" fill="#9a9a92">what only a human knows</text>
  <g font-size="13.5" fill="#d7dad2">
    <text x="680" y="188">Purpose</text>
    <text x="680" y="214">Recovery steps</text>
    <text x="680" y="240">Credential pointers</text>
    <text x="680" y="266">Relationships</text>
  </g>
  <text x="680" y="322" font-size="12" fill="#9a9a92" font-style="italic">markdown notes that</text>
  <text x="680" y="342" font-size="12" fill="#9a9a92" font-style="italic">survive re-collection</text>

  <line x1="916" y1="229" x2="962" y2="229" stroke="#7fc9a2" stroke-width="2.5" marker-end="url(#arw)"/>

  <!-- 4. Artifact -->
  <rect x="970" y="96" width="190" height="266" rx="12" fill="#1d2620" stroke="#2f6f4f" stroke-width="2"/>
  <text x="990" y="128" font-size="17" font-weight="700" fill="#7fc9a2">4 · The runbook</text>
  <text x="990" y="150" font-size="12.5" fill="#9a9a92">the product</text>
  <g font-size="13.5" fill="#e8e8e2" font-weight="600">
    <text x="990" y="190">📄 HTML</text>
    <text x="990" y="220">🌿 Markdown</text>
    <text x="990" y="250">🖨️ PDF</text>
  </g>
  <text x="990" y="300" font-size="12" fill="#b9bcb4" font-style="italic">self-contained.</text>
  <text x="990" y="320" font-size="12" fill="#b9bcb4" font-style="italic">USB stick, git repo,</text>
  <text x="990" y="340" font-size="12" fill="#b9bcb4" font-style="italic">or a printed binder.</text>

  <text x="40" y="410" font-size="14" fill="#9a9a92">The web UI is for browsing and annotating. <tspan fill="#e8e8e2" font-weight="600">The artifact is the product</tspan> — it survives the death of the thing it documents.</text>
</svg>
